<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#0a0a0a"/>
  <!-- Geometric building grid lines (from logo mark) -->
  <g stroke="#888" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="10" y1="42" x2="28" y2="10"/>
    <line x1="10" y1="42" x2="10" y2="10"/>
    <line x1="28" y1="10" x2="28" y2="42"/>
    <line x1="10" y1="20" x2="28" y2="20"/>
    <line x1="10" y1="30" x2="28" y2="30"/>
    <line x1="18" y1="10" x2="18" y2="42"/>
  </g>
  <!-- "A" letterform in white -->
  <polygon points="20,10 32,42 8,42" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="12" y1="32" x2="28" y2="32" stroke="#fff" stroke-width="2.5"/>
  <!-- Red accent dot -->
  <circle cx="52" cy="52" r="5" fill="#CC1111"/>
</svg>
